# Codemagic CI/CD configuration for NanoWakeWord
# Free tier: 500 build minutes/month with macOS
# No external dependencies needed — all Apple frameworks

workflows:
  build-ipa:
    name: Build NanoWakeWord IPA
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      xcode: 16.0
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cat > project.yml << 'YML'
          name: NanoWakeWord
          options:
            bundleIdPrefix: com.zahidul
            deploymentTarget:
              iOS: "16.0"
            generateEmptyDirectories: true
            groupSortPosition: top
          settings:
            base:
              PRODUCT_BUNDLE_IDENTIFIER: com.zahidul.nanowakeword
              MARKETING_VERSION: "1.0.0"
              CURRENT_PROJECT_VERSION: "1"
              SWIFT_VERSION: "5.0"
              DEVELOPMENT_TEAM: ""
              CODE_SIGN_IDENTITY: "-"
              CODE_SIGNING_REQUIRED: "NO"
              CODE_SIGNING_ALLOWED: "NO"
              TARGETED_DEVICE_FAMILY: "1,2"
          targets:
            NanoWakeWord:
              type: application
              platform: iOS
              sources:
                - path: NanoWakeWord
                  excludes:
                    - "**/.DS_Store"
              info:
                path: NanoWakeWord/Resources/Info.plist
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.zahidul.nanowakeword
                CODE_SIGN_IDENTITY: "-"
                CODE_SIGNING_REQUIRED: "NO"
                CODE_SIGNING_ALLOWED: "NO"
                DEVELOPMENT_TEAM: ""
                LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
                ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
          YML
          xcodegen generate

      - name: Build unsigned archive
        script: |
          set -o pipefail
          xcodebuild \
            -project NanoWakeWord.xcodeproj \
            -scheme NanoWakeWord \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGNING_ALLOWED="NO" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive \
            -archivePath build/NanoWakeWord.xcarchive \
            SKIP_INSTALL=NO \
            2>&1 | tee build.log | xcpretty || { echo "BUILD FAILED"; tail -150 build.log; exit 1; }

      - name: Create IPA from archive
        script: |
          # Find the .app inside the xcarchive
          APP_PATH=$(find build/NanoWakeWord.xcarchive -name "*.app" -type d | head -1)
          echo "Found .app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in xcarchive"
            echo "=== xcarchive contents ==="
            find build/NanoWakeWord.xcarchive -type d | head -30
            exit 1
          fi

          # Manual IPA creation (unsigned)
          rm -rf Payload
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r NanoWakeWord_unsigned.ipa Payload/
          rm -rf Payload

          echo "=== IPA created ==="
          ls -lh NanoWakeWord_unsigned.ipa

          # Copy to Codemagic build directory for artifact publishing
          mkdir -p "$CM_BUILD_DIR"
          cp NanoWakeWord_unsigned.ipa "$CM_BUILD_DIR/NanoWakeWord_unsigned.ipa"
          echo "IPA copied to $CM_BUILD_DIR/NanoWakeWord_unsigned.ipa"

      - name: Upload IPA for download
        script: |
          echo "Uploading IPA to file hosting (no tokens needed)..."

          # Method 1: tmpfiles.org (keeps file for 1 hour, direct download)
          LINK1=$(curl -s -F "file=@NanoWakeWord_unsigned.ipa" https://tmpfiles.org/api/v1/upload)
          DL_URL1=$(echo "$LINK1" | jq -r '.data.url // empty' 2>/dev/null)
          if [ -n "$DL_URL1" ]; then
            # Convert page URL to direct download URL
            DIRECT1="https://tmpfiles.org/dl$(echo "$DL_URL1" | sed 's|https://tmpfiles.org||')"
            echo "tmpfiles.org: $DIRECT1"
          fi

          # Method 2: 0x0.st (direct link, no account needed)
          LINK2=$(curl -s -F "file=@NanoWakeWord_unsigned.ipa" https://0x0.st)
          if [ -n "$LINK2" ] && echo "$LINK2" | grep -q "^http"; then
            echo "0x0.st: $LINK2"
          fi

          # Method 3: Try GitHub Release if token is available (bonus)
          if [ -n "$GITHUB_TOKEN" ]; then
            TAG="v1.0.0-build-${CM_BUILD_ID:-manual}"
            REPO="zahidSkywalker/NanoWakeWord"
            echo "GITHUB_TOKEN found, also uploading to GitHub Releases..."
            RELEASE_RESP=$(curl -s -w "\n%{http_code}" -X POST \
              "https://api.github.com/repos/$REPO/releases" \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg tag "$TAG" --arg name "Build ${CM_BUILD_ID:-manual}" \
                --arg body "Unsigned IPA" \
                '{tag_name:$tag,target_commitish:"main",name:$name,body:$body,draft:false,prerelease:true}')")
            HTTP_CODE=$(echo "$RELEASE_RESP" | tail -1)
            RELEASE_JSON=$(echo "$RELEASE_RESP" | sed '$d')
            if [ "$HTTP_CODE" = "201" ]; then
              UPLOAD_URL=$(echo "$RELEASE_JSON" | jq -r '.upload_url' | sed 's/{?name,label}//')
              curl -s -X POST "${UPLOAD_URL}?name=NanoWakeWord_unsigned.ipa" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@NanoWakeWord_unsigned.ipa"
              echo "GitHub: https://github.com/$REPO/releases/download/$TAG/NanoWakeWord_unsigned.ipa"
            fi
          fi

          echo ""
          echo "=========================================="
          echo "Use any link above in eSign -> Import"
          echo "=========================================="

    artifacts:
      - NanoWakeWord_unsigned.ipa

    