# Codemagic CI/CD configuration for NanoWakeWord
# Free tier: 500 build minutes/month with macOS
# No external dependencies needed — all Apple frameworks

workflows:
  build-ipa:
    name: Build NanoWakeWord IPA
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      xcode: 16.0
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cat > project.yml << 'YML'
          name: NanoWakeWord
          options:
            bundleIdPrefix: com.zahidul
            deploymentTarget:
              iOS: "16.0"
            generateEmptyDirectories: true
            groupSortPosition: top
          settings:
            base:
              PRODUCT_BUNDLE_IDENTIFIER: com.zahidul.nanowakeword
              MARKETING_VERSION: "1.0.0"
              CURRENT_PROJECT_VERSION: "1"
              SWIFT_VERSION: "5.0"
              DEVELOPMENT_TEAM: ""
              CODE_SIGN_IDENTITY: "-"
              CODE_SIGNING_REQUIRED: "NO"
              CODE_SIGNING_ALLOWED: "NO"
              TARGETED_DEVICE_FAMILY: "1,2"
          targets:
            NanoWakeWord:
              type: application
              platform: iOS
              sources:
                - path: NanoWakeWord
                  excludes:
                    - "**/.DS_Store"
              info:
                path: NanoWakeWord/Resources/Info.plist
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.zahidul.nanowakeword
                CODE_SIGN_IDENTITY: "-"
                CODE_SIGNING_REQUIRED: "NO"
                CODE_SIGNING_ALLOWED: "NO"
                DEVELOPMENT_TEAM: ""
                LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
                ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
          YML
          xcodegen generate

      - name: Build unsigned archive
        script: |
          set -o pipefail
          xcodebuild \
            -project NanoWakeWord.xcodeproj \
            -scheme NanoWakeWord \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGNING_ALLOWED="NO" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive \
            -archivePath build/NanoWakeWord.xcarchive \
            SKIP_INSTALL=NO \
            2>&1 | tee build.log | xcpretty || { echo "BUILD FAILED"; tail -150 build.log; exit 1; }

      - name: Create IPA from archive
        script: |
          # Find the .app inside the xcarchive
          APP_PATH=$(find build/NanoWakeWord.xcarchive -name "*.app" -type d | head -1)
          echo "Found .app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in xcarchive"
            echo "=== xcarchive contents ==="
            find build/NanoWakeWord.xcarchive -type d | head -30
            exit 1
          fi

          # Manual IPA creation (unsigned)
          rm -rf Payload
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r NanoWakeWord_unsigned.ipa Payload/
          rm -rf Payload

          echo "=== IPA created ==="
          ls -lh NanoWakeWord_unsigned.ipa

          # Copy to Codemagic build directory for artifact publishing
          mkdir -p "$CM_BUILD_DIR"
          cp NanoWakeWord_unsigned.ipa "$CM_BUILD_DIR/NanoWakeWord_unsigned.ipa"
          echo "IPA copied to $CM_BUILD_DIR/NanoWakeWord_unsigned.ipa"

    artifacts:
      - NanoWakeWord_unsigned.ipa

    