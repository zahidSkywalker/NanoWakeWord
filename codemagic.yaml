# Codemagic CI/CD configuration for NanoWakeWord
# Free tier: 500 build minutes/month with macOS
# No external dependencies needed — all Apple frameworks

workflows:
  build-ipa:
    name: Build NanoWakeWord IPA
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      xcode: 16.0
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cat > project.yml << 'YML'
          name: NanoWakeWord
          options:
            bundleIdPrefix: com.zahidul
            deploymentTarget:
              iOS: "16.0"
            generateEmptyDirectories: true
            groupSortPosition: top
          settings:
            base:
              PRODUCT_BUNDLE_IDENTIFIER: com.zahidul.nanowakeword
              MARKETING_VERSION: "1.0.0"
              CURRENT_PROJECT_VERSION: "1"
              SWIFT_VERSION: "5.0"
              DEVELOPMENT_TEAM: ""
              CODE_SIGN_IDENTITY: "-"
              CODE_SIGNING_REQUIRED: "NO"
              CODE_SIGNING_ALLOWED: "NO"
              TARGETED_DEVICE_FAMILY: "1,2"
          targets:
            NanoWakeWord:
              type: application
              platform: iOS
              sources:
                - path: NanoWakeWord
                  excludes:
                    - "**/.DS_Store"
              info:
                path: NanoWakeWord/Resources/Info.plist
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.zahidul.nanowakeword
                CODE_SIGN_IDENTITY: "-"
                CODE_SIGNING_REQUIRED: "NO"
                CODE_SIGNING_ALLOWED: "NO"
                DEVELOPMENT_TEAM: ""
                LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
                ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
          YML
          xcodegen generate

      - name: Build unsigned archive
        script: |
          set -o pipefail
          xcodebuild \
            -project NanoWakeWord.xcodeproj \
            -scheme NanoWakeWord \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGNING_ALLOWED="NO" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive \
            -archivePath build/NanoWakeWord.xcarchive \
            SKIP_INSTALL=NO \
            2>&1 | tee build.log | xcpretty || { echo "BUILD FAILED"; tail -150 build.log; exit 1; }

      - name: Create ExportOptions.plist
        script: |
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
              <key>provisioningProfiles</key>
              <dict/>
              <key>signingCertificate</key>
              <string>-</string>
              <key>teamID</key>
              <string></string>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/NanoWakeWord.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa_output \
            2>&1 | tee export.log | xcpretty || {
              echo "Standard export failed, creating manual IPA..."
              # Fallback: manual IPA creation
              APP_PATH=$(find build/NanoWakeWord.xcarchive -name "*.app" -type d | head -1)
              if [ -z "$APP_PATH" ]; then
                echo "ERROR: No .app found in build output"
                exit 1
              fi
              mkdir -p Payload
              cp -r "$APP_PATH" Payload/
              zip -r NanoWakeWord_unsigned.ipa Payload/
              echo "Manual IPA created successfully"
            }

      - name: Find and verify IPA
        script: |
          echo "=== Looking for IPA ==="
          # Check Codemagic export path
          if [ -d build/ipa_output ]; then
            echo "Contents of ipa_output:"
            ls -laR build/ipa_output/
          fi
          # Check manual IPA
          if [ -f NanoWakeWord_unsigned.ipa ]; then
            echo "Manual IPA found:"
            ls -lh NanoWakeWord_unsigned.ipa
          fi
          # Search everywhere
          find . -name "*.ipa" -exec ls -lh {} \;

      - name: Copy IPA to artifact path
        script: |
          # Codemagic expects artifacts in specific locations
          IPA_FILE=$(find . -name "*.ipa" -type f 2>/dev/null | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "No IPA found!"
            exit 1
          fi
          cp "$IPA_FILE" "$CM_BUILD_DIR/NanoWakeWord_unsigned.ipa"
          echo "IPA ready at: $CM_BUILD_DIR/NanoWakeWord_unsigned.ipa"
          ls -lh "$CM_BUILD_DIR/NanoWakeWord_unsigned.ipa"

    artifacts:
      - build/ipa_output/*.ipa
      - NanoWakeWord_unsigned.ipa

    publishing:
      artifacts:
        - path: NanoWakeWord_unsigned.ipa
          name: NanoWakeWord-IPA